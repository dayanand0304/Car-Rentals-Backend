spring:
  datasource:
    url: jdbc:h2:mem:car_rentals_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

logging:
  level:
    org:
      springframework:
        security: WARN

jwt:
  secret: test-jwt-secret-key-for-ci-and-local-tests-123456
  expiration: 3600000
